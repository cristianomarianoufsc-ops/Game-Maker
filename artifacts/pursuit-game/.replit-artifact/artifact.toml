kind = "web"
previewPath = "/"
title = "Pursuit — Jogo de Perseguição 2D"
version = "1.0.0"
id = "artifacts/pursuit-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19918

[services.development]
run = "pnpm --filter @workspace/pursuit-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pursuit-game", "run", "build" ]
publicDir = "artifacts/pursuit-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19918"
BASE_PATH = "/"
